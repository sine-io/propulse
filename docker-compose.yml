x-propulse-database-url: &propulse-database-url "postgres://${PROPULSE_POSTGRES_USER:-propulse}:${PROPULSE_POSTGRES_PASSWORD:-propulse}@postgres:5432/${PROPULSE_POSTGRES_DB:-propulse}?sslmode=disable"

x-propulse-environment: &propulse-environment
  PROPULSE_DATABASE_URL: *propulse-database-url
  PROPULSE_REDIS_ADDR: redis:6379
  PROPULSE_HTTP_ADDR: :8080
  PROPULSE_ACCESS_TOKEN: "${PROPULSE_ACCESS_TOKEN:-local-access-token}"
  PROPULSE_USER_ID: "${PROPULSE_USER_ID:-propulse-user}"
  PROPULSE_SCHEDULER_INTERVAL: "${PROPULSE_SCHEDULER_INTERVAL:-1h}"
  PROPULSE_LOG_LEVEL: "${PROPULSE_LOG_LEVEL:-info}"
  PROPULSE_LOG_PRETTY: "${PROPULSE_LOG_PRETTY:-false}"

x-logging: &default-logging
  driver: local
  options:
    max-size: 10m
    max-file: "3"

x-propulse-service: &propulse-service
  image: propulse:local
  environment: *propulse-environment
  networks:
    - propulse
  init: true
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=64m
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped
  stop_grace_period: 30s
  logging: *default-logging

services:
  migrate:
    <<: *propulse-service
    container_name: propulse-migrate
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/propulse", "migrate", "up"]
    environment:
      PROPULSE_DATABASE_URL: *propulse-database-url
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  propulse:
    <<: *propulse-service
    container_name: propulse
    command: ["/usr/local/bin/propulse", "api"]
    ports:
      - "${PROPULSE_BIND_ADDRESS:-127.0.0.1}:${PROPULSE_HTTP_PORT:-8317}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  propulse-worker:
    <<: *propulse-service
    container_name: propulse-worker
    command: ["/usr/local/bin/propulse", "worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  propulse-scheduler:
    <<: *propulse-service
    container_name: propulse-scheduler
    command: ["/usr/local/bin/propulse", "scheduler"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: propulse-postgres
    environment:
      POSTGRES_USER: "${PROPULSE_POSTGRES_USER:-propulse}"
      POSTGRES_PASSWORD: "${PROPULSE_POSTGRES_PASSWORD:-propulse}"
      POSTGRES_DB: "${PROPULSE_POSTGRES_DB:-propulse}"
    ports:
      - "${PROPULSE_BIND_ADDRESS:-127.0.0.1}:${PROPULSE_POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - propulse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: propulse-redis
    ports:
      - "${PROPULSE_BIND_ADDRESS:-127.0.0.1}:${PROPULSE_REDIS_PORT:-16379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - propulse
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    logging: *default-logging

networks:
  propulse:
    name: propulse-network
    driver: bridge

volumes:
  postgres-data:
    name: propulse-postgres-data
  redis-data:
    name: propulse-redis-data
