openapi: 3.0.3
info:
  title: Propulse Backend API
  version: 0.1.0
paths:
  /api/v1/capacity/calculations:
    post:
      summary: Create a housing capacity calculation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HousingCapacityInput'
      responses:
        '201':
          description: Calculation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCalculationResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/capacity/calculations/{id}:
    get:
      summary: Get a saved housing capacity calculation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Calculation found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationResponse'
        '404':
          description: Calculation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/neighborhoods:
    post:
      summary: Create a neighborhood
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNeighborhoodRequest'
      responses:
        '201':
          description: Neighborhood created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/neighborhoods/{id}:
    get:
      summary: Get a neighborhood
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Neighborhood found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodResponse'
        '404':
          description: Neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/neighborhoods/{id}/metrics:
    get:
      summary: Get latest neighborhood metrics with signal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest metric found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodMetricResponse'
        '404':
          description: Metric not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/watchlist/items:
    post:
      summary: Add a neighborhood to the demo user's watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWatchlistItemRequest'
      responses:
        '201':
          description: Watchlist item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddWatchlistItemResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/watchlist:
    get:
      summary: List the demo user's watchlist
      responses:
        '200':
          description: Watchlist items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
  /api/v1/decision/action-window:
    get:
      summary: Recommend the current action window for the demo user
      parameters:
        - in: query
          name: neighborhoodId
          required: false
          schema:
            type: string
          description: Neighborhood to evaluate. Defaults to the first demo watchlist item.
      responses:
        '200':
          description: Action window recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionWindowResponse'
        '400':
          description: Request cannot produce an action window yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                capacityRequired:
                  value:
                    error:
                      code: capacity_required
                      message: create a capacity calculation before requesting an action window
                watchlistRequired:
                  value:
                    error:
                      code: watchlist_required
                      message: add a neighborhood to the watchlist before requesting an action window
                invalidNeighborhoodID:
                  value:
                    error:
                      code: invalid_neighborhood_id
                      message: neighborhoodId must be a valid UUID
        '404':
          description: Neighborhood metric is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: metric_required
                  message: no neighborhood metric is available
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/api/imports:
    post:
      summary: Manually import listing snapshots from JSON
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualImportRequest'
      responses:
        '201':
          description: Listings imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualImportResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Admin bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin bearer token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Import failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
  schemas:
    HousingCapacityInput:
      type: object
      required:
        - cashOnHand
        - oldHomeValue
        - oldLoanBalance
        - monthlyIncome
        - currentMonthlyMortgage
        - acceptableMonthlyMortgage
        - targetTotalPrice
        - renovationBudget
        - transactionCosts
        - transitionRentCost
      properties:
        cashOnHand:
          type: number
        oldHomeValue:
          type: number
        oldLoanBalance:
          type: number
        monthlyIncome:
          type: number
        currentMonthlyMortgage:
          type: number
        acceptableMonthlyMortgage:
          type: number
        targetTotalPrice:
          type: number
        renovationBudget:
          type: number
        transactionCosts:
          type: number
        transitionRentCost:
          type: number
    HousingCapacityResult:
      type: object
      required:
        - netOldHomeProceeds
        - deployableCash
        - safeTotalPrice
        - strainedTotalPrice
        - dangerTotalPrice
        - downPaymentGap
        - monthlyPayment
        - monthlyPaymentRatio
        - pressureLevel
        - minimumSafeOldHomeSalePrice
        - strategy
        - reasons
      properties:
        netOldHomeProceeds:
          type: number
        deployableCash:
          type: number
        safeTotalPrice:
          type: number
        strainedTotalPrice:
          type: number
        dangerTotalPrice:
          type: number
        downPaymentGap:
          type: number
        monthlyPayment:
          type: number
        monthlyPaymentRatio:
          type: number
        pressureLevel:
          type: string
          enum: [safe, strained, danger]
        minimumSafeOldHomeSalePrice:
          type: number
        strategy:
          type: string
          enum: ["先卖后买或同步推进", "可以同步推进", "暂缓改善"]
        reasons:
          type: array
          items:
            type: string
    CreateCalculationResponse:
      type: object
      required: [id, result]
      properties:
        id:
          type: string
        result:
          type: object
          required: [pressureLevel, strategy]
          properties:
            pressureLevel:
              type: string
              enum: [safe, strained, danger]
            strategy:
              type: string
              enum: ["先卖后买或同步推进", "可以同步推进", "暂缓改善"]
    CalculationResponse:
      type: object
      required: [id, input, result, createdAt]
      properties:
        id:
          type: string
        input:
          $ref: '#/components/schemas/HousingCapacityInput'
        result:
          $ref: '#/components/schemas/HousingCapacityResult'
        createdAt:
          type: string
          format: date-time
    CreateNeighborhoodRequest:
      type: object
      required: [name, area, targetLayout]
      properties:
        name:
          type: string
        area:
          type: string
        targetLayout:
          type: string
    NeighborhoodResponse:
      type: object
      required: [id, name, area, targetLayout]
      properties:
        id:
          type: string
        name:
          type: string
        area:
          type: string
        targetLayout:
          type: string
        createdAt:
          type: string
          format: date-time
    NeighborhoodMetricResponse:
      type: object
      required:
        - id
        - neighborhoodId
        - listedHomes
        - priceCutHomes
        - avgDaysOnMarket
        - transactionMomentum
        - targetLayoutSupply
        - status
        - supplyPressure
        - advice
      properties:
        id:
          type: string
        neighborhoodId:
          type: string
        listedHomes:
          type: integer
        priceCutHomes:
          type: integer
        avgDaysOnMarket:
          type: number
        listingPriceMin:
          type: number
        listingPriceMax:
          type: number
        transactionPriceMin:
          type: number
        transactionPriceMax:
          type: number
        transactionMomentum:
          type: string
          enum: [weak, stable, strong]
        targetLayoutSupply:
          type: integer
        status:
          type: string
          enum: ["重点看", "继续观察", "适合砍价", "价格偏硬", "暂不建议追"]
        supplyPressure:
          type: string
          enum: [low, medium, high]
        priceCutShare:
          type: number
        priceGapPct:
          type: number
        targetLayoutScarcity:
          type: string
          enum: [low, medium, high]
        advice:
          type: string
        reasons:
          type: array
          items:
            type: string
        calculatedAt:
          type: string
          format: date-time
    AddWatchlistItemRequest:
      type: object
      required: [neighborhoodId]
      properties:
        neighborhoodId:
          type: string
    AddWatchlistItemResponse:
      type: object
      required: [id, neighborhoodId, userId, createdAt]
      properties:
        id:
          type: string
        neighborhoodId:
          type: string
        userId:
          type: string
        createdAt:
          type: string
          format: date-time
    WatchlistResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistItem'
    WatchlistItem:
      type: object
      required:
        - id
        - neighborhoodId
        - name
        - area
        - targetLayout
        - status
        - listedHomes
        - priceCutHomes
        - transactionMomentum
        - advice
      properties:
        id:
          type: string
        neighborhoodId:
          type: string
        name:
          type: string
        area:
          type: string
        targetLayout:
          type: string
        status:
          type: string
          enum: ["重点看", "继续观察", "适合砍价", "价格偏硬", "暂不建议追"]
        listedHomes:
          type: integer
        priceCutHomes:
          type: integer
        transactionMomentum:
          type: string
          enum: [weak, stable, strong]
        advice:
          type: string
    ActionWindowResponse:
      type: object
      required: [action, confidence, summary, checklist, risks]
      properties:
        action:
          type: string
          enum: ["看", "等", "砍价", "出手"]
          example: "砍价"
        confidence:
          type: string
          enum: ["低", "中", "高"]
          example: "高"
        summary:
          type: string
          example: "预算仍可服务，且目标小区供应与降价信号支持买方试探底价。"
        checklist:
          type: array
          items:
            type: string
          example:
            - "约看 3 套成交区间附近、挂牌超过 60 天的目标户型。"
        risks:
          type: array
          items:
            type: string
          example:
            - "预算不是完全宽松，砍价失败时不要上调总价硬追。"
    ManualImportRequest:
      type: object
      required: [sourceType, sourceRef, neighborhoodId, records]
      properties:
        sourceType:
          type: string
          enum: [manual_json]
        sourceRef:
          type: string
          example: demo-weekly-import
        neighborhoodId:
          type: string
          format: uuid
        records:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/ManualImportRecord'
    ManualImportRecord:
      type: object
      required: [listingPrice, daysOnMarket]
      properties:
        listingPrice:
          type: number
          exclusiveMinimum: true
          minimum: 0
        transactionPrice:
          type: number
          nullable: true
          exclusiveMinimum: true
          minimum: 0
        priceCut:
          type: boolean
        daysOnMarket:
          type: integer
          minimum: 0
        layout:
          type: string
    ManualImportResponse:
      type: object
      required: [collectionRunId, importedSnapshotCount]
      properties:
        collectionRunId:
          type: string
          format: uuid
        importedSnapshotCount:
          type: integer
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
