name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PROPULSE_DATABASE_URL: postgres://propulse:propulse@127.0.0.1:5432/propulse?sslmode=disable
      PROPULSE_TEST_DATABASE_URL: postgres://propulse:propulse@127.0.0.1:5432/propulse?sslmode=disable
      PROPULSE_USER_ID: propulse-ci-user
      PROPULSE_ACCESS_TOKEN: propulse-ci-access-token

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: propulse
          POSTGRES_PASSWORD: propulse
          POSTGRES_DB: propulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propulse -d propulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.23.1
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Prepare integration database
        run: go run ./cmd/propulse migrate up

      - name: Lint Go
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Verify repository
        run: make verify
