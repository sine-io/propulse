openapi: 3.0.3
info:
  title: Propulse Backend API
  version: 0.1.0
paths:
  /api/v1/access:
    get:
      summary: Validate the configured personal access token
      security:
        - AccessBearerAuth: []
      responses:
        '200':
          description: Access token accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessStatusResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
  /api/v1/capacity/assumptions:
    get:
      summary: Get default calculation assumptions
      description: Public. Returns the complete currently effective rule set used to pre-fill reproducible calculations.
      responses:
        '200':
          description: Default assumptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacityAssumptionsResponse'
  /api/v1/capacity/calculations:
    post:
      summary: Create a housing capacity calculation
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HousingCapacityInput'
      responses:
        '201':
          description: Calculation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCalculationResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/capacity/calculations/{id}:
    get:
      summary: Get a saved housing capacity calculation
      security:
        - AccessBearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Calculation found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationResponse'
        '404':
          description: Calculation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/neighborhoods:
    get:
      summary: Search neighborhoods
      description: Public, anonymous. Supports fuzzy query, area/layout filters and pagination.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: area
          in: query
          required: false
          schema:
            type: string
        - name: targetLayout
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Matching neighborhoods
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodSearchResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a neighborhood
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNeighborhoodRequest'
      responses:
        '201':
          description: Neighborhood created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
  /api/v1/neighborhoods/{id}:
    get:
      summary: Get a neighborhood
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Neighborhood found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodResponse'
        '404':
          description: Neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/neighborhoods/{id}/metrics:
    get:
      summary: Get latest neighborhood metrics with signal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest metric found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodMetricResponse'
        '404':
          description: Metric not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/neighborhoods/{id}/metrics/history:
    get:
      summary: Get current-algorithm neighborhood metric history and comparisons
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive collection-time lower bound. Defaults to eight weeks before `to`.
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive collection-time upper bound. Defaults to the current time.
      responses:
        '200':
          description: Metric history, including an explicit empty status when no points exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricHistoryResponse'
        '400':
          description: Invalid or longer-than-52-week time window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/watchlist/items:
    post:
      summary: Add a neighborhood to the user's watchlist
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWatchlistItemRequest'
      responses:
        '201':
          description: Watchlist item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddWatchlistItemResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '404':
          description: Neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/watchlist:
    get:
      summary: List the user's watchlist
      security:
        - AccessBearerAuth: []
      responses:
        '200':
          description: Watchlist items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
  /api/v1/decision/action-window:
    get:
      summary: Recommend the current action window
      security:
        - AccessBearerAuth: []
      parameters:
        - in: query
          name: neighborhoodId
          required: false
          schema:
            type: string
          description: Neighborhood to evaluate. Defaults to the first watchlist item.
      responses:
        '200':
          description: Action window recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionWindowResponse'
        '400':
          description: Request cannot produce an action window yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                capacityRequired:
                  value:
                    error:
                      code: capacity_required
                      message: create a capacity calculation before requesting an action window
                watchlistRequired:
                  value:
                    error:
                      code: watchlist_required
                      message: add a neighborhood to the watchlist before requesting an action window
                invalidNeighborhoodID:
                  value:
                    error:
                      code: invalid_neighborhood_id
                      message: neighborhoodId must be a valid UUID
        '401':
          $ref: '#/components/responses/AccessRequired'
        '404':
          description: Neighborhood metric is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: metric_required
                  message: no neighborhood metric is available
        '409':
          description: The latest metric exists but cannot support an action window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                metricStale:
                  value:
                    error:
                      code: metric_stale
                      message: the latest neighborhood metric is stale
                metricInsufficient:
                  value:
                    error:
                      code: metric_insufficient
                      message: the latest neighborhood metric is insufficient
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/api/data-sources:
    post:
      summary: Create or resolve a trusted market data source
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDataSourceRequest'
      responses:
        '201':
          description: Data source created or resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSource'
        '400':
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '422':
          description: Data source fields are invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Data source operation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List trusted market data sources
      security:
        - AccessBearerAuth: []
      responses:
        '200':
          description: Data sources
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DataSource'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '500':
          description: Data source operation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/api/imports/json:
    post:
      summary: Import a traceable JSON collection run
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportJSONRequest'
      responses:
        '200':
          description: Idempotent replay of an existing collection run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCollectionRunResponse'
        '201':
          description: Collection run imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCollectionRunResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '404':
          description: Selected source or neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds 2 MiB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Import records failed semantic validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportValidationErrorResponse'
        '500':
          description: Import failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/api/imports/csv:
    post:
      summary: Import a traceable CSV collection run through the shared import pipeline
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [dataSourceId, neighborhoodId, sourceRef, collectedAt, coverage, file]
              properties:
                dataSourceId:
                  type: string
                  format: uuid
                neighborhoodId:
                  type: string
                  format: uuid
                sourceRef:
                  type: string
                  maxLength: 256
                collectedAt:
                  type: string
                  format: date-time
                coverage:
                  type: string
                  enum: [full, partial]
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Idempotent replay of an existing collection run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCollectionRunResponse'
        '201':
          description: Collection run imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCollectionRunResponse'
        '400':
          description: Invalid multipart request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '404':
          description: Selected source or neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: CSV file or multipart request exceeds its size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: CSV parsing or import semantic validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportValidationErrorResponse'
        '500':
          description: Import failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/api/imports/csv/template:
    get:
      summary: Download the canonical UTF-8 CSV import template
      security:
        - AccessBearerAuth: []
      responses:
        '200':
          description: CSV header template
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            text/csv:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/AccessRequired'
  /admin/api/imports/{id}:
    get:
      summary: Get a traceable collection run and normalized observations
      security:
        - AccessBearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Collection run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionRunDetail'
        '400':
          description: Invalid collection run ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '404':
          description: Collection run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Import lookup failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    AccessBearerAuth:
      type: http
      scheme: bearer
  responses:
    AccessRequired:
      description: Valid bearer access token is required
      headers:
        WWW-Authenticate:
          description: Authentication scheme required to access this operation
          schema:
            type: string
            example: Bearer
          example: Bearer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: access_required
              message: valid bearer access token is required
  schemas:
    HousingCapacityInput:
      type: object
      required:
        - cashOnHand
        - oldHomeValue
        - oldLoanBalance
        - monthlyIncome
        - currentMonthlyMortgage
        - acceptableMonthlyMortgage
        - targetTotalPrice
        - renovationBudget
        - transactionCosts
        - transitionRentCost
      properties:
        cashOnHand:
          type: number
          minimum: 0
          description: Available cash, in ten-thousand CNY.
        oldHomeValue:
          type: number
          minimum: 0
          description: Expected old-home sale price, in ten-thousand CNY.
        oldLoanBalance:
          type: number
          minimum: 0
          description: Outstanding old-home loan, in ten-thousand CNY.
        monthlyIncome:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Monthly household income, in ten-thousand CNY.
        currentMonthlyMortgage:
          type: number
          minimum: 0
          description: Existing monthly mortgage, in ten-thousand CNY.
        acceptableMonthlyMortgage:
          type: number
          minimum: 0
          description: Maximum acceptable new monthly mortgage, in ten-thousand CNY.
        targetTotalPrice:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Target home total price, in ten-thousand CNY.
        renovationBudget:
          type: number
          minimum: 0
          description: Renovation budget, in ten-thousand CNY.
        transactionCosts:
          type: number
          minimum: 0
          description: Taxes and transaction costs, in ten-thousand CNY.
        transitionRentCost:
          type: number
          minimum: 0
          description: Transition rent and moving costs, in ten-thousand CNY.
        loanOverride:
          $ref: '#/components/schemas/LoanParams'
        cityPolicyOverride:
          $ref: '#/components/schemas/CityPolicyOverride'
    LoanParams:
      type: object
      required: [annualInterestRate, loanTermMonths, repaymentMethod]
      properties:
        annualInterestRate:
          type: number
          minimum: 0
          maximum: 1
        loanTermMonths:
          type: integer
          minimum: 1
          maximum: 600
        repaymentMethod:
          type: string
          enum: [equal_installment, equal_principal]
    CityPolicyOverride:
      type: object
      required: [city, policyName, downPaymentRate, effectiveDate, source]
      properties:
        city:
          type: string
          minLength: 1
        policyName:
          type: string
          minLength: 1
        downPaymentRate:
          type: number
          minimum: 0
          maximum: 1
          exclusiveMinimum: true
          exclusiveMaximum: true
        effectiveDate:
          type: string
          format: date
        source:
          type: string
          minLength: 1
    AssumptionOrigin:
      type: string
      enum: [configured_default, user_override]
    CityPolicy:
      allOf:
        - $ref: '#/components/schemas/CityPolicyOverride'
        - type: object
          required: [origin]
          properties:
            origin:
              $ref: '#/components/schemas/AssumptionOrigin'
    PressureThresholds:
      type: object
      required: [safeRatio, strainedRatio, dangerRatio, dangerMultiplier]
      properties:
        safeRatio:
          type: number
        strainedRatio:
          type: number
        dangerRatio:
          type: number
        dangerMultiplier:
          type: number
    AppliedAssumptions:
      type: object
      required:
        - ruleVersion
        - effectiveDate
        - ruleSource
        - loan
        - loanSource
        - loanOrigin
        - cityPolicy
        - reserveMonths
        - pressureThresholds
        - oldHomeShareThreshold
      properties:
        ruleVersion:
          type: string
        effectiveDate:
          type: string
          format: date
        ruleSource:
          type: string
        loan:
          $ref: '#/components/schemas/LoanParams'
        loanSource:
          type: string
        loanOrigin:
          $ref: '#/components/schemas/AssumptionOrigin'
        cityPolicy:
          $ref: '#/components/schemas/CityPolicy'
        reserveMonths:
          type: number
          minimum: 0
        pressureThresholds:
          $ref: '#/components/schemas/PressureThresholds'
        oldHomeShareThreshold:
          type: number
          minimum: 0
          maximum: 1
    CapacityAssumptionsResponse:
      type: object
      required:
        - ruleVersion
        - effectiveDate
        - ruleSource
        - downPaymentRate
        - loan
        - loanSource
        - loanOrigin
        - cityPolicy
        - reserveMonths
        - pressureThresholds
        - oldHomeShareThreshold
      properties:
        ruleVersion:
          type: string
        effectiveDate:
          type: string
          format: date
        ruleSource:
          type: string
        downPaymentRate:
          type: number
          description: Compatibility alias for cityPolicy.downPaymentRate.
        loan:
          $ref: '#/components/schemas/LoanParams'
        loanSource:
          type: string
        loanOrigin:
          $ref: '#/components/schemas/AssumptionOrigin'
        cityPolicy:
          $ref: '#/components/schemas/CityPolicy'
        reserveMonths:
          type: number
        pressureThresholds:
          $ref: '#/components/schemas/PressureThresholds'
        oldHomeShareThreshold:
          type: number
    HousingCapacityResult:
      type: object
      required:
        - netOldHomeProceeds
        - deployableCash
        - safeTotalPrice
        - strainedTotalPrice
        - dangerTotalPrice
        - downPaymentGap
        - monthlyPayment
        - monthlyPaymentRatio
        - pressureLevel
        - minimumSafeOldHomeSalePrice
        - strategy
        - reasons
        - ruleVersion
        - effectiveDate
        - traceabilityStatus
        - appliedAssumptions
      properties:
        netOldHomeProceeds:
          type: number
        deployableCash:
          type: number
        safeTotalPrice:
          type: number
        strainedTotalPrice:
          type: number
        dangerTotalPrice:
          type: number
        downPaymentGap:
          type: number
        monthlyPayment:
          type: number
        monthlyPaymentRatio:
          type: number
        pressureLevel:
          type: string
          enum: [safe, strained, danger]
        minimumSafeOldHomeSalePrice:
          type: number
        strategy:
          type: string
          enum: ["先卖后买或同步推进", "可以同步推进", "暂缓改善"]
        reasons:
          type: array
          items:
            type: string
        ruleVersion:
          type: string
        effectiveDate:
          type: string
        traceabilityStatus:
          type: string
          enum: [complete, legacy_unversioned]
        appliedAssumptions:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AppliedAssumptions'
    CreateCalculationResponse:
      allOf:
        - $ref: '#/components/schemas/CalculationResponse'
    CalculationResponse:
      type: object
      required: [id, input, result, createdAt]
      properties:
        id:
          type: string
        input:
          $ref: '#/components/schemas/HousingCapacityInput'
        result:
          $ref: '#/components/schemas/HousingCapacityResult'
        createdAt:
          type: string
          format: date-time
    CreateNeighborhoodRequest:
      type: object
      required: [name, area, targetLayout]
      properties:
        name:
          type: string
        area:
          type: string
        targetLayout:
          type: string
    NeighborhoodResponse:
      type: object
      required: [id, name, area, targetLayout]
      properties:
        id:
          type: string
        name:
          type: string
        area:
          type: string
        targetLayout:
          type: string
        createdAt:
          type: string
          format: date-time
    NeighborhoodSearchResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NeighborhoodResponse'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    NeighborhoodMetricResponse:
      type: object
      required:
        - id
        - neighborhoodId
        - collectionRunId
        - sourceIds
        - latestObservedAt
        - collectedAt
        - algorithmVersion
        - listedHomes
        - priceCutHomes
        - avgDaysOnMarket
        - transactionMomentum
        - transactionEvidence
        - targetLayoutSupply
        - listingSampleCount
        - transactionSampleCount
        - coverage
        - freshness
        - qualityState
        - qualityWarnings
        - status
        - supplyPressure
        - advice
        - calculatedAt
      properties:
        id:
          type: string
        neighborhoodId:
          type: string
        collectionRunId:
          type: string
          format: uuid
        inventoryCollectionRunId:
          type: string
          format: uuid
        sourceIds:
          type: array
          items:
            type: string
            format: uuid
        latestObservedAt:
          type: string
          format: date-time
        collectedAt:
          type: string
          format: date-time
        algorithmVersion:
          type: string
        listedHomes:
          type: integer
        priceCutHomes:
          type: integer
        avgDaysOnMarket:
          type: number
          nullable: true
        listingPriceMin:
          type: number
          nullable: true
        listingPriceMax:
          type: number
          nullable: true
        transactionPriceMin:
          type: number
          nullable: true
        transactionPriceMax:
          type: number
          nullable: true
        transactionMomentum:
          type: string
          enum: [unknown, weak, stable, strong]
        transactionEvidence:
          $ref: '#/components/schemas/TransactionMomentumEvidence'
        targetLayoutSupply:
          type: integer
        listingSampleCount:
          type: integer
        transactionSampleCount:
          type: integer
        coverage:
          type: string
          enum: [full, partial]
        freshness:
          type: string
          enum: [unknown, current, stale, expired]
        qualityState:
          type: string
