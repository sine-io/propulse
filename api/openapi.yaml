        factors:
          type: array
          minItems: 6
          maxItems: 6
          items:
            $ref: '#/components/schemas/DecisionFactor'
        checklist:
          type: array
          items:
            type: string
          example:
            - "约看 3 套成交区间附近、挂牌超过 60 天的目标户型。"
        risks:
          type: array
          items:
