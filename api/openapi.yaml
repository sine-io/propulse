openapi: 3.0.3
info:
  title: Propulse Backend API
  version: 0.1.0
paths:
  /api/v1/access:
    get:
      summary: Validate the configured personal access token
      security:
        - AccessBearerAuth: []
      responses:
        '200':
          description: Access token accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessStatusResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
  /api/v1/capacity/calculations:
    post:
      summary: Create a housing capacity calculation
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HousingCapacityInput'
      responses:
        '201':
          description: Calculation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCalculationResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/capacity/calculations/{id}:
    get:
      summary: Get a saved housing capacity calculation
      security:
        - AccessBearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Calculation found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationResponse'
        '404':
          description: Calculation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/neighborhoods:
    get:
      summary: Search neighborhoods
      description: Public, anonymous. Supports fuzzy query, area/layout filters and pagination.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: area
          in: query
          required: false
          schema:
            type: string
        - name: targetLayout
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Matching neighborhoods
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodSearchResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a neighborhood
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNeighborhoodRequest'
      responses:
        '201':
          description: Neighborhood created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
  /api/v1/neighborhoods/{id}:
    get:
      summary: Get a neighborhood
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Neighborhood found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodResponse'
        '404':
          description: Neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/neighborhoods/{id}/metrics:
    get:
      summary: Get latest neighborhood metrics with signal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest metric found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeighborhoodMetricResponse'
        '404':
          description: Metric not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/watchlist/items:
    post:
      summary: Add a neighborhood to the user's watchlist
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWatchlistItemRequest'
      responses:
        '201':
          description: Watchlist item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddWatchlistItemResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '404':
          description: Neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/watchlist:
    get:
      summary: List the user's watchlist
      security:
        - AccessBearerAuth: []
      responses:
        '200':
          description: Watchlist items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
  /api/v1/decision/action-window:
    get:
      summary: Recommend the current action window
      security:
        - AccessBearerAuth: []
      parameters:
        - in: query
          name: neighborhoodId
          required: false
          schema:
            type: string
          description: Neighborhood to evaluate. Defaults to the first watchlist item.
      responses:
        '200':
          description: Action window recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionWindowResponse'
        '400':
          description: Request cannot produce an action window yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                capacityRequired:
                  value:
                    error:
                      code: capacity_required
                      message: create a capacity calculation before requesting an action window
                watchlistRequired:
                  value:
                    error:
                      code: watchlist_required
                      message: add a neighborhood to the watchlist before requesting an action window
                invalidNeighborhoodID:
                  value:
                    error:
                      code: invalid_neighborhood_id
                      message: neighborhoodId must be a valid UUID
        '401':
          $ref: '#/components/responses/AccessRequired'
        '404':
          description: Neighborhood metric is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: metric_required
                  message: no neighborhood metric is available
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/api/data-sources:
    post:
      summary: Create or resolve a trusted market data source
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDataSourceRequest'
      responses:
        '201':
          description: Data source created or resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSource'
        '400':
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '422':
          description: Data source fields are invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Data source operation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List trusted market data sources
      security:
        - AccessBearerAuth: []
      responses:
        '200':
          description: Data sources
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DataSource'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '500':
          description: Data source operation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/api/imports/json:
    post:
      summary: Import a traceable JSON collection run
      security:
        - AccessBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportJSONRequest'
      responses:
        '200':
          description: Idempotent replay of an existing collection run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCollectionRunResponse'
        '201':
          description: Collection run imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCollectionRunResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '404':
          description: Selected source or neighborhood not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds 2 MiB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Import records failed semantic validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Import failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/api/imports/{id}:
    get:
      summary: Get a traceable collection run and normalized observations
      security:
        - AccessBearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Collection run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionRunDetail'
        '400':
          description: Invalid collection run ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/AccessRequired'
        '404':
          description: Collection run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Import lookup failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    AccessBearerAuth:
      type: http
      scheme: bearer
  responses:
    AccessRequired:
      description: Valid bearer access token is required
      headers:
        WWW-Authenticate:
          description: Authentication scheme required to access this operation
          schema:
            type: string
            example: Bearer
          example: Bearer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: access_required
              message: valid bearer access token is required
  schemas:
    HousingCapacityInput:
      type: object
      required:
        - cashOnHand
        - oldHomeValue
        - oldLoanBalance
        - monthlyIncome
        - currentMonthlyMortgage
        - acceptableMonthlyMortgage
        - targetTotalPrice
        - renovationBudget
        - transactionCosts
        - transitionRentCost
      properties:
        cashOnHand:
          type: number
        oldHomeValue:
          type: number
        oldLoanBalance:
          type: number
        monthlyIncome:
          type: number
        currentMonthlyMortgage:
          type: number
        acceptableMonthlyMortgage:
          type: number
        targetTotalPrice:
          type: number
        renovationBudget:
          type: number
        transactionCosts:
          type: number
        transitionRentCost:
          type: number
    HousingCapacityResult:
      type: object
      required:
        - netOldHomeProceeds
        - deployableCash
        - safeTotalPrice
        - strainedTotalPrice
        - dangerTotalPrice
        - downPaymentGap
        - monthlyPayment
        - monthlyPaymentRatio
        - pressureLevel
        - minimumSafeOldHomeSalePrice
        - strategy
        - reasons
        - ruleVersion
        - effectiveDate
      properties:
        netOldHomeProceeds:
          type: number
        deployableCash:
          type: number
        safeTotalPrice:
          type: number
        strainedTotalPrice:
          type: number
        dangerTotalPrice:
          type: number
        downPaymentGap:
          type: number
        monthlyPayment:
          type: number
        monthlyPaymentRatio:
          type: number
        pressureLevel:
          type: string
          enum: [safe, strained, danger]
        minimumSafeOldHomeSalePrice:
          type: number
        strategy:
          type: string
          enum: ["先卖后买或同步推进", "可以同步推进", "暂缓改善"]
        reasons:
          type: array
          items:
            type: string
        ruleVersion:
          type: string
        effectiveDate:
          type: string
    CreateCalculationResponse:
      type: object
      required: [id, result]
      properties:
        id:
          type: string
        result:
          type: object
          required: [pressureLevel, strategy, ruleVersion, effectiveDate]
          properties:
            pressureLevel:
              type: string
              enum: [safe, strained, danger]
            strategy:
              type: string
              enum: ["先卖后买或同步推进", "可以同步推进", "暂缓改善"]
            ruleVersion:
              type: string
            effectiveDate:
              type: string
    CalculationResponse:
      type: object
      required: [id, input, result, createdAt]
      properties:
        id:
          type: string
        input:
          $ref: '#/components/schemas/HousingCapacityInput'
        result:
          $ref: '#/components/schemas/HousingCapacityResult'
        createdAt:
          type: string
          format: date-time
    CreateNeighborhoodRequest:
      type: object
      required: [name, area, targetLayout]
      properties:
        name:
          type: string
        area:
          type: string
        targetLayout:
          type: string
    NeighborhoodResponse:
      type: object
      required: [id, name, area, targetLayout]
      properties:
        id:
          type: string
        name:
          type: string
        area:
          type: string
        targetLayout:
          type: string
        createdAt:
          type: string
          format: date-time
    NeighborhoodSearchResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NeighborhoodResponse'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    NeighborhoodMetricResponse:
      type: object
      required:
        - id
        - neighborhoodId
        - collectionRunId
        - sourceIds
        - latestObservedAt
        - listedHomes
        - priceCutHomes
        - avgDaysOnMarket
        - transactionMomentum
        - targetLayoutSupply
        - listingSampleCount
        - transactionSampleCount
        - coverage
        - freshness
        - qualityState
        - qualityWarnings
        - status
        - supplyPressure
        - advice
      properties:
        id:
          type: string
        neighborhoodId:
          type: string
        collectionRunId:
          type: string
          format: uuid
        inventoryCollectionRunId:
          type: string
          format: uuid
        sourceIds:
          type: array
          items:
            type: string
            format: uuid
        latestObservedAt:
          type: string
          format: date-time
        listedHomes:
          type: integer
        priceCutHomes:
          type: integer
        avgDaysOnMarket:
          type: number
          nullable: true
        listingPriceMin:
          type: number
          nullable: true
        listingPriceMax:
          type: number
          nullable: true
        transactionPriceMin:
          type: number
          nullable: true
        transactionPriceMax:
          type: number
          nullable: true
        transactionMomentum:
          type: string
          enum: [unknown, weak, stable, strong]
        targetLayoutSupply:
          type: integer
        listingSampleCount:
          type: integer
        transactionSampleCount:
          type: integer
        coverage:
          type: string
          enum: [full, partial]
        freshness:
          type: string
          enum: [unknown, current, stale, expired]
        qualityState:
          type: string
          enum: [sufficient, low_confidence, insufficient_data]
        qualityWarnings:
          type: array
          items:
            type: string
        status:
          type: string
          enum: ["数据不足", "重点看", "继续观察", "适合砍价", "价格偏硬", "暂不建议追"]
        supplyPressure:
          type: string
          enum: [unknown, low, medium, high]
        priceCutShare:
          type: number
        priceGapPct:
          type: number
        targetLayoutScarcity:
          type: string
          enum: [unknown, low, medium, high]
        advice:
          type: string
        reasons:
          type: array
          items:
            type: string
        calculatedAt:
          type: string
          format: date-time
    AddWatchlistItemRequest:
      type: object
      required: [neighborhoodId]
      properties:
        neighborhoodId:
          type: string
    AddWatchlistItemResponse:
      type: object
      required: [id, neighborhoodId, userId, createdAt]
      properties:
        id:
          type: string
        neighborhoodId:
          type: string
        userId:
          type: string
        createdAt:
          type: string
          format: date-time
    WatchlistResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistItem'
    WatchlistItem:
      type: object
      required:
        - id
        - neighborhoodId
        - name
        - area
        - targetLayout
        - status
        - listedHomes
        - priceCutHomes
        - transactionMomentum
        - advice
      properties:
        id:
          type: string
        neighborhoodId:
          type: string
        name:
          type: string
        area:
          type: string
        targetLayout:
          type: string
        status:
          type: string
          enum: ["重点看", "继续观察", "适合砍价", "价格偏硬", "暂不建议追"]
        listedHomes:
          type: integer
        priceCutHomes:
          type: integer
        transactionMomentum:
          type: string
          enum: [weak, stable, strong]
        advice:
          type: string
    ActionWindowResponse:
      type: object
      required: [action, confidence, summary, checklist, risks]
      properties:
        action:
          type: string
          enum: ["看", "等", "砍价", "出手"]
          example: "砍价"
        confidence:
          type: string
          enum: ["低", "中", "高"]
          example: "高"
        summary:
          type: string
          example: "预算仍可服务，且目标小区供应与降价信号支持买方试探底价。"
        checklist:
          type: array
          items:
            type: string
          example:
            - "约看 3 套成交区间附近、挂牌超过 60 天的目标户型。"
        risks:
          type: array
          items:
            type: string
          example:
            - "预算不是完全宽松，砍价失败时不要上调总价硬追。"
    AccessStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [unlocked]
    CreateDataSourceRequest:
      type: object
      required: [name, sourceType, city]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        sourceType:
          type: string
          pattern: '^[a-z][a-z0-9_]{0,63}$'
        city:
          type: string
          minLength: 1
          maxLength: 128
        notes:
          type: string
          maxLength: 2048
    DataSource:
      type: object
      required: [id, name, sourceType, city, notes, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sourceType:
          type: string
        city:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ImportJSONRequest:
      type: object
      required: [dataSourceId, neighborhoodId, sourceRef, collectedAt, coverage, records]
      properties:
        dataSourceId:
          type: string
          format: uuid
        neighborhoodId:
          type: string
          format: uuid
        sourceRef:
          type: string
          maxLength: 256
        collectedAt:
          type: string
          format: date-time
        coverage:
          type: string
          enum: [full, partial]
        records:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/ImportJSONRecord'
    ImportJSONRecord:
      type: object
      required: [recordType, sourceRecordId, layout, areaSqm]
      properties:
        recordType:
          type: string
          enum: [listing, transaction]
        sourceRecordId:
          type: string
          maxLength: 128
        layout:
          type: string
          maxLength: 64
        areaSqm:
          type: number
          minimum: 0
          exclusiveMinimum: true
        listingPrice:
          type: number
          minimum: 0
          exclusiveMinimum: true
        transactionPrice:
          type: number
          minimum: 0
          exclusiveMinimum: true
        transactionDate:
          type: string
          format: date
        daysOnMarket:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [active, pending, withdrawn, sold]
        originalListingRef:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
    CollectionRun:
      type: object
      required: [id, dataSourceId, neighborhoodId, sourceRef, collectedAt, coverage, format, contentChecksum, rawContentType, validationSummary, status, metricStatus, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        dataSourceId:
          type: string
          format: uuid
        neighborhoodId:
          type: string
          format: uuid
        sourceRef:
          type: string
        collectedAt:
          type: string
          format: date-time
        coverage:
          type: string
          enum: [full, partial]
        format:
          type: string
          enum: [json, csv]
        contentChecksum:
          type: string
        rawContentType:
          type: string
        validationSummary:
          $ref: '#/components/schemas/ValidationSummary'
        status:
          type: string
          enum: [completed]
        metricStatus:
          type: string
          enum: [pending, completed, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ValidationSummary:
      type: object
      required: [recordCount, listingCount, transactionCount, issues]
      properties:
        recordCount:
          type: integer
        listingCount:
          type: integer
        transactionCount:
          type: integer
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
    ValidationIssue:
      type: object
      required: [field, code, message]
      properties:
        row:
          type: integer
        field:
          type: string
        code:
          type: string
        message:
          type: string
    ImportCollectionRunResponse:
      type: object
      required: [collectionRun, listingObservationCount, transactionObservationCount, idempotentReplay, metricRefreshStatus]
      properties:
        collectionRun:
          $ref: '#/components/schemas/CollectionRun'
        listingObservationCount:
          type: integer
        transactionObservationCount:
          type: integer
        idempotentReplay:
          type: boolean
        metricRefreshStatus:
          type: string
          enum: [pending, completed, failed]
    ListingObservation:
      type: object
      required: [id, collectionRunId, neighborhoodId, sourceListingId, sourceRow, layout, areaSqm, listingPrice, daysOnMarket, status, capturedAt, attributes]
      properties:
        id: {type: string, format: uuid}
        collectionRunId: {type: string, format: uuid}
        neighborhoodId: {type: string, format: uuid}
        sourceListingId: {type: string}
        sourceRow: {type: integer}
        layout: {type: string}
        areaSqm: {type: number}
        listingPrice: {type: number, description: 万元}
        daysOnMarket: {type: integer}
        status: {type: string, enum: [active, pending, withdrawn, sold]}
        capturedAt: {type: string, format: date-time}
        attributes:
          type: object
          additionalProperties: {type: string}
    TransactionObservation:
      type: object
      required: [id, collectionRunId, neighborhoodId, sourceRecordId, sourceRow, layout, areaSqm, transactionPrice, transactionDate, capturedAt]
      properties:
        id: {type: string, format: uuid}
        collectionRunId: {type: string, format: uuid}
        neighborhoodId: {type: string, format: uuid}
        sourceRecordId: {type: string}
        sourceRow: {type: integer}
        layout: {type: string}
        areaSqm: {type: number}
        transactionPrice: {type: number, description: 万元}
        transactionDate: {type: string, format: date}
        originalListingRef: {type: string}
        capturedAt: {type: string, format: date-time}
    CollectionRunDetail:
      type: object
      required: [collectionRun, source, listings, transactions, rawPayloadBase64]
      properties:
        collectionRun:
          $ref: '#/components/schemas/CollectionRun'
        source:
          $ref: '#/components/schemas/DataSource'
        listings:
          type: array
          items:
            $ref: '#/components/schemas/ListingObservation'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionObservation'
        rawPayloadBase64:
          type: string
          format: byte
    ValidationErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
              enum: [validation_failed]
            message:
              type: string
            details:
              type: array
              items:
                $ref: '#/components/schemas/ValidationIssue'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
