          enum: ["适合砍价", "重点看", "继续观察", "暂不建议追", "价格偏硬"]
        candidateSignal:
          type: string
          nullable: true
          enum: ["适合砍价", "重点看", "继续观察", "暂不建议追", "价格偏硬"]
        signalRankDifference:
          type: integer
          nullable: true
        targetLayoutSupply:
          type: integer
          minimum: 0
        candidateTargetLayoutSupply:
          type: integer
          nullable: true
          minimum: 0
        supplyDifference:
          type: integer
          nullable: true
        supplyDifferencePct:
          type: number
          nullable: true
        metric:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DecisionMetricReference'
    AccessStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [unlocked]
    CreateDataSourceRequest:
      type: object
      required: [name, sourceType, city]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        sourceType:
          type: string
          pattern: '^[a-z][a-z0-9_]{0,63}$'
        city:
          type: string
          minLength: 1
          maxLength: 128
        notes:
          type: string
          maxLength: 2048
    DataSource:
      type: object
      required: [id, name, sourceType, city, notes, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sourceType:
          type: string
        city:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ImportJSONRequest:
      type: object
      required: [dataSourceId, neighborhoodId, sourceRef, collectedAt, coverage, records]
      properties:
        dataSourceId:
          type: string
          format: uuid
        neighborhoodId:
          type: string
          format: uuid
        sourceRef:
          type: string
          maxLength: 256
        collectedAt:
          type: string
          format: date-time
        coverage:
          type: string
          enum: [full, partial]
        records:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/ImportJSONRecord'
    ImportJSONRecord:
      type: object
      required: [recordType, sourceRecordId, layout, areaSqm]
      properties:
        recordType:
          type: string
          enum: [listing, transaction]
        sourceRecordId:
          type: string
          maxLength: 128
        layout:
          type: string
          maxLength: 64
        areaSqm:
          type: number
          minimum: 0
          exclusiveMinimum: true
        listingPrice:
          type: number
          minimum: 0
          exclusiveMinimum: true
        transactionPrice:
          type: number
          minimum: 0
          exclusiveMinimum: true
        transactionDate:
          type: string
          format: date
        daysOnMarket:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [active, pending, withdrawn, sold]
        originalListingRef:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
    CollectionRun:
      type: object
      required: [id, dataSourceId, neighborhoodId, sourceRef, collectedAt, coverage, format, contentChecksum, rawContentType, validationSummary, status, metricStatus, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        dataSourceId:
          type: string
          format: uuid
        neighborhoodId:
          type: string
          format: uuid
        sourceRef:
          type: string
        collectedAt:
          type: string
          format: date-time
        coverage:
          type: string
          enum: [full, partial]
        format:
          type: string
          enum: [json, csv]
        contentChecksum:
          type: string
        rawContentType:
          type: string
        validationSummary:
          $ref: '#/components/schemas/ValidationSummary'
        status:
          type: string
          enum: [completed]
        metricStatus:
          type: string
          enum: [pending, completed, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CollectionRunSummary:
      type: object
      required: [collectionRun, source, neighborhoodName, recordCount, listingCount, transactionCount, detailHref]
      properties:
        collectionRun: {$ref: '#/components/schemas/CollectionRun'}
        source: {$ref: '#/components/schemas/DataSource'}
        neighborhoodName: {type: string}
        recordCount: {type: integer, minimum: 0}
        listingCount: {type: integer, minimum: 0}
        transactionCount: {type: integer, minimum: 0}
        detailHref: {type: string}
    CollectionRunsPage:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items: {$ref: '#/components/schemas/CollectionRunSummary'}
        total: {type: integer, minimum: 0}
        page: {type: integer, minimum: 1}
        pageSize: {type: integer, minimum: 1, maximum: 100}
    ValidationSummary:
      type: object
      required: [recordCount, listingCount, transactionCount, issues]
      properties:
        recordCount:
          type: integer
        listingCount:
          type: integer
        transactionCount:
          type: integer
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
    ValidationIssue:
      type: object
      required: [field, code, message]
      properties:
        row:
          type: integer
        field:
          type: string
        code:
          type: string
        message:
          type: string
    ImportCollectionRunResponse:
      type: object
      required: [collectionRunId, acceptedRecordCount, rejectedRecordCount, collectionRun, listingObservationCount, transactionObservationCount, idempotentReplay, metricRefreshStatus]
      properties:
        collectionRunId:
          type: string
          format: uuid
        acceptedRecordCount:
          type: integer
          minimum: 0
        rejectedRecordCount:
          type: integer
          minimum: 0
        collectionRun:
          $ref: '#/components/schemas/CollectionRun'
        listingObservationCount:
          type: integer
        transactionObservationCount:
          type: integer
        idempotentReplay:
          type: boolean
        metricRefreshStatus:
          type: string
          enum: [pending, completed, failed]
    ListingObservation:
      type: object
      required: [id, collectionRunId, neighborhoodId, sourceListingId, sourceRow, layout, areaSqm, listingPrice, daysOnMarket, status, capturedAt, attributes]
      properties:
        id: {type: string, format: uuid}
        collectionRunId: {type: string, format: uuid}
        neighborhoodId: {type: string, format: uuid}
        sourceListingId: {type: string}
        sourceRow: {type: integer}
        layout: {type: string}
        areaSqm: {type: number}
        listingPrice: {type: number, description: 万元}
        daysOnMarket: {type: integer}
        status: {type: string, enum: [active, pending, withdrawn, sold]}
        capturedAt: {type: string, format: date-time}
        attributes:
          type: object
          additionalProperties: {type: string}
    TransactionObservation:
      type: object
      required: [id, collectionRunId, neighborhoodId, sourceRecordId, sourceRow, layout, areaSqm, transactionPrice, transactionDate, capturedAt]
      properties:
        id: {type: string, format: uuid}
        collectionRunId: {type: string, format: uuid}
        neighborhoodId: {type: string, format: uuid}
        sourceRecordId: {type: string}
        sourceRow: {type: integer}
        layout: {type: string}
        areaSqm: {type: number}
        transactionPrice: {type: number, description: 万元}
        transactionDate: {type: string, format: date}
        originalListingRef: {type: string}
        capturedAt: {type: string, format: date-time}
    CollectionRunDetail:
      type: object
      required: [collectionRun, source, listings, transactions, rawPayloadBase64]
      properties:
        collectionRun:
          $ref: '#/components/schemas/CollectionRun'
        source:
          $ref: '#/components/schemas/DataSource'
        listings:
          type: array
          items:
            $ref: '#/components/schemas/ListingObservation'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionObservation'
        rawPayloadBase64:
          type: string
          format: byte
    ValidationErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
              enum: [validation_failed]
            message:
              type: string
            details:
              type: array
              items:
                $ref: '#/components/schemas/ValidationIssue'
    ImportValidationErrorResponse:
      type: object
      required: [error, acceptedRecordCount, rejectedRecordCount]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
              enum: [validation_failed]
            message:
              type: string
            details:
              type: array
              items:
                $ref: '#/components/schemas/ValidationIssue'
        acceptedRecordCount:
          type: integer
          enum: [0]
        rejectedRecordCount:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
