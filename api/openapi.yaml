components:
  securitySchemes:
    AccessBearerAuth:
      type: http
      scheme: bearer
  responses:
    AccessRequired:
      description: Valid bearer access token is required
      headers:
        WWW-Authenticate:
          description: Authentication scheme required to access this operation
          schema:
            type: string
            example: Bearer
          example: Bearer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: unauthorized
              message: valid bearer access token is required
  schemas:
    ReviewNoteKind:
      type: string
      enum: [review, viewing_note]
    CreateReviewNoteRequest:
      type: object
      additionalProperties: false
      required: [kind, content]
      properties:
        kind:
          $ref: '#/components/schemas/ReviewNoteKind'
        content:
          type: string
          minLength: 1
          maxLength: 8000
          description: Content is trimmed and measured in Unicode characters.
        neighborhoodId:
          type: string
          format: uuid
          nullable: true
        weekStartDate:
          type: string
          format: date
          nullable: true
    UpdateReviewNoteRequest:
      type: object
      additionalProperties: false
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 8000
          description: Content is trimmed and measured in Unicode characters.
    ReviewNoteResponse:
      type: object
      required: [id, kind, neighborhoodId, weekStartDate, content, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: '#/components/schemas/ReviewNoteKind'
        neighborhoodId:
          type: string
          format: uuid
          nullable: true
        weekStartDate:
          type: string
          format: date
          nullable: true
        content:
          type: string
          minLength: 1
          maxLength: 8000
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ReviewNotesPageResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewNoteResponse'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
    AssetPropertySelection:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode: {type: string, enum: [market_listing, manual]}
        roomId: {type: string, minLength: 1, maxLength: 128}
        layout: {type: string, minLength: 1, maxLength: 64}
        areaSqm: {type: number, exclusiveMinimum: true, minimum: 0, maximum: 10000}
        floorBand: {type: string, maxLength: 64}
        floorDescription: {type: string, maxLength: 128}
        orientation: {type: string, maxLength: 128}
        currentListingPriceWan: {type: number, exclusiveMinimum: true, minimum: 0, description: 万元}
    CreateAssetRequest:
      type: object
      additionalProperties: false
      required: [neighborhoodId, propertySelection, originalPurchasePriceWan, purchasedOn, currentLoanBalanceWan]
      properties:
        name: {type: string, minLength: 1, maxLength: 128}
        neighborhoodId: {type: string, format: uuid}
        propertySelection: {$ref: '#/components/schemas/AssetPropertySelection'}
        originalPurchasePriceWan: {type: number, exclusiveMinimum: true, minimum: 0, description: 万元}
        purchasedOn: {type: string, format: date}
        currentLoanBalanceWan: {type: number, minimum: 0, description: 万元}
    UpdateAssetRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: {type: string, minLength: 1, maxLength: 128}
        propertySelection: {$ref: '#/components/schemas/AssetPropertySelection'}
        originalPurchasePriceWan: {type: number, exclusiveMinimum: true, minimum: 0, description: 万元}
        purchasedOn: {type: string, format: date}
        currentLoanBalanceWan: {type: number, minimum: 0, description: 万元}
    AssetProperty:
      type: object
      additionalProperties: false
      required: [neighborhoodId, neighborhoodName, city, district, layout, areaSqm, floorBand, floorDescription, orientation, currentListingPriceWan]
      properties:
        neighborhoodId: {type: string, format: uuid}
        neighborhoodName: {type: string}
        city: {type: string}
        district: {type: string}
        layout: {type: string}
        areaSqm: {type: number}
        floorBand: {type: string}
        floorDescription: {type: string}
        orientation: {type: string}
        currentListingPriceWan: {type: number, nullable: true, description: 万元}
    AssetListingSource:
      type: object
      additionalProperties: false
      required: [sourceListingId, dataSourceId, dataSourceName, dataSourceType, sourceRef, collectionRunId, snapshotId, collectedAt, listedAt, qualityStatus]
      properties:
        sourceListingId: {type: string}
        dataSourceId: {type: string, format: uuid}
        dataSourceName: {type: string}
        dataSourceType: {type: string}
        sourceRef: {type: string}
        collectionRunId: {type: string, format: uuid}
        snapshotId: {type: string, format: uuid}
        collectedAt: {type: string, format: date-time}
        listedAt: {type: string, format: date-time}
        qualityStatus: {type: string, enum: [complete]}
    AssetResponse:
      type: object
      additionalProperties: false
      required: [id, name, property, originalPurchasePriceWan, purchasedOn, currentLoanBalanceWan, sourceKind, listingSource, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        property: {$ref: '#/components/schemas/AssetProperty'}
        originalPurchasePriceWan: {type: number, description: 万元}
        purchasedOn: {type: string, format: date}
        currentLoanBalanceWan: {type: number, description: 万元}
        sourceKind: {type: string, enum: [manual, market_listing]}
        listingSource:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AssetListingSource'
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    AssetsPageResponse:
      type: object
      additionalProperties: false
      required: [items, total, page, pageSize]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/AssetResponse'}}
        total: {type: integer, minimum: 0}
        page: {type: integer, minimum: 1}
        pageSize: {type: integer, minimum: 1, maximum: 100}
    HousingCapacityInput:
      type: object
      additionalProperties: false
      required:
        - cashOnHand
        - oldHomeValue
        - oldLoanBalance
        - monthlyIncome
        - currentMonthlyMortgage
        - acceptableMonthlyMortgage
        - targetTotalPrice
        - renovationBudget
        - transitionRentCost
      properties:
        cashOnHand:
          type: number
          minimum: 0
          description: Available cash, in ten-thousand CNY.
        oldHomeValue:
          type: number
          minimum: 0
          description: Expected old-home sale price, in ten-thousand CNY.
        oldLoanBalance:
          type: number
          minimum: 0
          description: Outstanding old-home loan, in ten-thousand CNY.
        monthlyIncome:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Monthly household income, in ten-thousand CNY.
        currentMonthlyMortgage:
          type: number
          minimum: 0
          description: Existing monthly mortgage, in ten-thousand CNY.
        acceptableMonthlyMortgage:
          type: number
          minimum: 0
          description: Maximum acceptable new monthly mortgage, in ten-thousand CNY.
        targetTotalPrice:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Target home total price, in ten-thousand CNY.
        renovationBudget:
          type: number
          minimum: 0
          description: Renovation budget, in ten-thousand CNY.
        transactionCosts:
          type: number
          minimum: 0
          description: Taxes and transaction costs, in ten-thousand CNY.
        transitionRentCost:
          type: number
          minimum: 0
          description: Transition rent and moving costs, in ten-thousand CNY.
        transactionScenario:
          $ref: '#/components/schemas/TransactionScenario'
        loanPlan:
          $ref: '#/components/schemas/LoanPlan'
        manualOverrides:
          $ref: '#/components/schemas/CalculationOverrides'
        loanOverride:
          $ref: '#/components/schemas/LoanParams'
        cityPolicyOverride:
          $ref: '#/components/schemas/CityPolicyOverride'
        oldHomeSelection:
          $ref: '#/components/schemas/OldHomeSelectionRequest'
        targetHomeSelection:
          $ref: '#/components/schemas/TargetHomeSelectionRequest'
    OldHomeSelectionRequest:
      type: object
      additionalProperties: false
      required: [mode, priceConfirmed]
      properties:
        mode: {type: string, enum: [none, asset]}
        assetId: {type: string, format: uuid}
        expectedSalePriceWan: {type: number, exclusiveMinimum: true, minimum: 0, description: 万元}
        priceConfirmed: {type: boolean}
    TargetHomeSelectionRequest:
      type: object
      additionalProperties: false
      required: [neighborhoodId, roomId, expectedPurchasePriceWan, priceConfirmed]
      properties:
        neighborhoodId: {type: string, format: uuid}
        roomId: {type: string, minLength: 1, maxLength: 128}
        expectedPurchasePriceWan: {type: number, exclusiveMinimum: true, minimum: 0, description: 万元}
        priceConfirmed: {type: boolean}
    SelectionPropertySnapshot:
      type: object
      required: [neighborhoodId, neighborhoodName, city, district, layout, areaSqm, floorBand, floorDescription, orientation, referenceListingPriceWan]
      properties:
        neighborhoodId: {type: string, format: uuid}
        neighborhoodName: {type: string}
        city: {type: string}
        district: {type: string}
        layout: {type: string}
        areaSqm: {type: number}
        floorBand: {type: string}
        floorDescription: {type: string}
        orientation: {type: string}
        referenceListingPriceWan: {type: number, nullable: true, description: 万元}
    MarketReferenceSnapshot:
      type: object
      required: [sourceListingId, dataSourceId, dataSourceName, dataSourceType, sourceRef, collectionRunId, snapshotId, collectedAt, listedAt, qualityStatus, freshness]
      properties:
        sourceListingId: {type: string}
        dataSourceId: {type: string, format: uuid}
        dataSourceName: {type: string}
        dataSourceType: {type: string}
        sourceRef: {type: string}
        collectionRunId: {type: string, format: uuid}
        snapshotId: {type: string, format: uuid}
        collectedAt: {type: string, format: date-time}
        listedAt: {type: string, format: date-time}
        qualityStatus: {type: string}
        freshness: {type: string, enum: ['', current, stale, expired, unknown]}
    OldHomeSelectionSnapshot:
      type: object
      required: [mode, assetId, assetName, property, originalPurchasePriceWan, purchasedOn, holdingYears, confirmedSalePriceWan, confirmedLoanBalanceWan, priceDifferenceWan, assetUpdatedAt, marketReference, confirmedAt]
      properties:
        mode: {type: string, enum: [none, asset]}
        assetId: {type: string, format: uuid, nullable: true}
        assetName: {type: string}
        property:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SelectionPropertySnapshot'
        originalPurchasePriceWan: {type: number}
        purchasedOn: {type: string}
